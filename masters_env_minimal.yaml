name: masters_env_minimal
channels:
  - conda-forge
dependencies:
  # Python
  - python=3.12.11

  # Core scientific stack
  - numpy=2.2.6
  - scipy=1.16.2
  - pandas=2.3.2
  - scikit-learn=1.7.2

  # Single-cell / spatial
  - scanpy=1.11.4
  - squidpy=1.6.5
  - anndata=0.12.2

  # Plotting
  - matplotlib-base=3.10.6
  - seaborn=0.13.2

  # Imaging
  - opencv=4.12.0
  - scikit-image=0.25.2

  # IO / formats
  - h5py=3.14.0

  # Utilities
  - tqdm=4.67.1

  # Optional but commonly required by scanpy/squidpy workflows
  - numba=0.61.2
  - umap-learn=0.5.9.post2
  - networkx=3.5

  # Pip (empty, but keeps flexibility)
  - pip